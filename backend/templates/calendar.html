<!doctype html>
<html lang="fr" class="antialiased">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Calendrier — Todom</title>
    <link href="https://unpkg.com/tailwindcss@^2/dist/tailwind.min.css" rel="stylesheet">
  </head>
  <body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100">
    <div class="p-6">
      <a href="/">← Retour</a>
      <h1 class="text-2xl font-bold my-4">Calendrier</h1>
      <div id="calendar-list" class="space-y-2"></div>
    </div>
    <script>
      async function load() {
        const res = await fetch('/api/tasks');
        const tasks = await res.json();
        const list = document.getElementById('calendar-list');
        tasks.filter(t=>t.due_date).sort((a,b)=>a.due_date.localeCompare(b.due_date)).forEach(t=>{
          const d = new Date(t.due_date).toLocaleString();
          const el = document.createElement('div');
          el.className='p-3 bg-white dark:bg-gray-800 rounded shadow';
          el.innerHTML = `<div class="font-semibold">${t.title}</div><div class="text-sm text-gray-500">${d}</div>`;
          list.appendChild(el);
        });
      }
      load();
    </script>
  </body>
</html>
